<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI Stock Monitoring</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #eef2ff; display: grid; place-items: center; min-height: 100vh; margin: 0; }
        .panel { background: #fff; border-radius: 16px; padding: 32px; width: min(420px, calc(100vw - 32px)); box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12); }
        input, button { width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 16px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        button { background: #2563eb; color: #fff; border: none; cursor: pointer; }
        .error { background: #fee2e2; color: #b91c1c; padding: 10px 12px; border-radius: 8px; margin-bottom: 16px; }
    </style>
</head>
<body>
<section class="panel">
    <h1>管理员登录</h1>
    <p>默认账号：admin / admin123</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
        <label>用户名</label>
        <input type="text" name="username" required>
        <label>密码</label>
        <input type="password" name="password" required>
        <button type="submit">登录</button>
    </form>
</section>
</body>
</html>
