<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} - AI Stock Monitoring</title>
    <style>
        :root {
            color-scheme: light;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
        header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        main { padding: 24px; max-width: 1320px; margin: 0 auto; }
        .banner { background: #fef3c7; color: #92400e; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
        .card { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
        h1, h2, h3 { margin-top: 0; }
        form { margin: 0; }
        input, select, textarea, button { width: 100%; padding: 10px 12px; margin-top: 8px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font: inherit; }
        textarea { min-height: 88px; resize: vertical; }
        button { background: #2563eb; color: #fff; border: none; cursor: pointer; }
        button.secondary { background: #475569; }
        button.danger { background: #dc2626; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #e5e7eb; text-align: left; vertical-align: top; }
        th { font-size: 13px; color: #64748b; white-space: nowrap; }
        .message { padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; border: 1px solid transparent; display: flex; align-items: center; gap: 10px; }
        .message::before { font-weight: 700; }
        .message-success { background: #dcfce7; color: #166534; border-color: #86efac; }
        .message-success::before { content: "✓"; }
        .message-error { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
        .message-error::before { content: "!"; }
        .message-warning { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
        .message-warning::before { content: "⚠"; }
        .message-info { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
        .message-info::before { content: "i"; }
        .status-danger, .danger-text { color: #dc2626; }
        .status-ok { color: #059669; }
        .top-nav a { color: #fff; margin-left: 12px; text-decoration: none; }
        .modal { position: fixed; top: 24px; right: 24px; width: min(420px, calc(100vw - 48px)); background: #fff; border: 2px solid #dc2626; border-radius: 12px; padding: 16px; box-shadow: 0 20px 30px rgba(15, 23, 42, 0.16); z-index: 10; }
        .pill { display: inline-block; background: #fee2e2; color: #991b1b; border-radius: 999px; padding: 4px 10px; font-size: 12px; }
        .footer-status { display: flex; gap: 16px; flex-wrap: wrap; font-size: 14px; color: #475569; }
        a.inline-link { color: #2563eb; text-decoration: none; }
        .header-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .muted { color: #64748b; font-size: 14px; }
        .checkbox-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px 12px; margin-bottom: 12px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; }
        .checkbox-item input { width: auto; margin: 0; }
        .hint-text { color: #64748b; font-size: 13px; margin-top: -4px; margin-bottom: 12px; }
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 12px; }
        .metric-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; }
        .metric-card strong { display: block; margin-bottom: 4px; }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
        .wide-table { min-width: 1160px; }
        .compact-table th, .compact-table td { padding-top: 10px; padding-bottom: 10px; }
        .nowrap { white-space: nowrap; }
        .soft-panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; }
        .stock-name { display: inline-block; max-width: 4em; line-height: 1.35; white-space: normal; word-break: keep-all; overflow-wrap: break-word; }
        .toolbar-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
        .inline-form { display: inline-flex; margin: 0; }
        .inline-form button { width: auto; margin: 0; }
        .tight-table th, .tight-table td { padding: 8px 10px; }
        .account-login-empty { color: #94a3b8; font-style: italic; }
        .signal-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
        .signal-badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .signal-buy { background: #fee2e2; color: #b91c1c; }
        .signal-sell { background: #dcfce7; color: #15803d; }
        .signal-neutral { background: #e2e8f0; color: #475569; }
        .action-buy { color: #b91c1c; font-weight: 700; }
        .action-sell { color: #15803d; font-weight: 700; }
        .action-neutral { color: #475569; font-weight: 700; }
        @media (max-width: 900px) {
            header { flex-direction: column; align-items: flex-start; }
            .top-nav a { margin-left: 0; margin-right: 12px; }
            main { padding: 16px; }
        }
    </style>
</head>
<body>
<header>
    <div class="header-meta">
        <strong>AI Stock Monitoring</strong>
        {% if current_user %}
        <span class="muted">当前账号：{{ current_user['username'] }}{% if current_user['is_admin'] %}（管理员）{% endif %}</span>
        {% endif %}
    </div>
    <nav class="top-nav">
        <a href="/dashboard">监控面板</a>
        <a href="/trades">交易复盘</a>
        <a href="/history">历史提醒</a>
        <a href="/logout">退出</a>
    </nav>
</header>
<main>
    <div class="banner">本系统提供的是监控和模型评分参考，不构成任何投资建议，也不承诺真实收益率。</div>
    {% if message %}
    <div class="message message-{{ message_type|default('info') }}">{{ message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
