<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} - AI Stock Monitoring</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
        header { background: #111827; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        main { padding: 24px; max-width: 1240px; margin: 0 auto; }
        .banner { background: #fef3c7; color: #92400e; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
        .card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
        h1, h2, h3 { margin-top: 0; }
        form { margin: 0; }
        input, select, textarea, button { width: 100%; padding: 10px 12px; margin-top: 8px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font: inherit; }
        textarea { min-height: 88px; resize: vertical; }
        button { background: #2563eb; color: #fff; border: none; cursor: pointer; }
        button.secondary { background: #475569; }
        button.danger { background: #dc2626; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #e5e7eb; text-align: left; vertical-align: top; }
        th { font-size: 13px; color: #64748b; }
        .message { background: #dbeafe; color: #1d4ed8; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }
        .status-danger, .danger-text { color: #dc2626; }
        .status-ok { color: #059669; }
        .top-nav a { color: #fff; margin-left: 12px; text-decoration: none; }
        .modal { position: fixed; top: 24px; right: 24px; width: min(420px, calc(100vw - 48px)); background: #fff; border: 2px solid #dc2626; border-radius: 12px; padding: 16px; box-shadow: 0 20px 30px rgba(15, 23, 42, 0.16); z-index: 10; }
        .pill { display: inline-block; background: #fee2e2; color: #991b1b; border-radius: 999px; padding: 4px 10px; font-size: 12px; }
        .footer-status { display: flex; gap: 16px; flex-wrap: wrap; font-size: 14px; color: #475569; }
        a.inline-link { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
<header>
    <strong>AI Stock Monitoring</strong>
    <nav class="top-nav">
        <a href="/dashboard">监控面板</a>
        <a href="/trades">交易复盘</a>
        <a href="/history">历史提醒</a>
        <a href="/logout">退出</a>
    </nav>
</header>
<main>
    <div class="banner">本系统仅为监控参考，不构成任何投资建议。</div>
    {% if message %}
    <div class="message">{{ message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
