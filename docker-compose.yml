version: "3.9"

services:
  ai-stock-monitoring:
    env_file:
      - .env
    build:
      context: .
    init: true
    container_name: ai-stock-monitoring
    ports:
      - "127.0.0.1:${ASM_PORT:-11223}:${ASM_PORT:-11223}"
    environment:
      ASM_HOST: ${ASM_HOST:-0.0.0.0}
      ASM_PORT: ${ASM_PORT:-11223}
      ASM_DB_PATH: ${ASM_DB_PATH:-/app/data/stock_monitor.db}
      ASM_PROVIDER: ${ASM_PROVIDER:-akshare}
      ASM_LLM_PROVIDER: ${ASM_LLM_PROVIDER:-openai}
      ASM_LLM_MODEL: ${ASM_LLM_MODEL:-gpt-4.1-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    stop_grace_period: 20s
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os, urllib.request;
          urllib.request.urlopen('http://127.0.0.1:%s/healthz' % os.getenv('ASM_PORT', '11223'), timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2
    container_name: ai-stock-monitoring-caddy
    depends_on:
      ai-stock-monitoring:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASM_PUBLIC_DOMAIN: ${ASM_PUBLIC_DOMAIN}
      ASM_TLS_EMAIL: ${ASM_TLS_EMAIL}
      ASM_PORT: ${ASM_PORT:-11223}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
    restart: unless-stopped
